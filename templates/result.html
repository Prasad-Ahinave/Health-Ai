<!DOCTYPE html>
<html>
<head>
    <title>Blood Report Analysis Result</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container">

    <div class="page-title">Blood Report Analysis Result</div>

    <div class="card">
        <table>
            <tr>
                <th>Test</th>
                <th>Value</th>
                <th>Status</th>
                <th>Health Suggestion</th>
            </tr>

            {% for item in results %}
            <tr>
                <td>{{ item.test }}</td>
                <td>{{ item.value }}</td>
                <td>
                    <span class="badge {{ item.status|lower }}">
                        {{ item.status }}
                    </span>
                </td>
                <td>{{ item.suggestion }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <div class="center">
        <a href="/download-pdf" class="btn">Download PDF</a>
        <a href="/" class="btn secondary">Back to Dashboard</a>
        <a href="/final-disclaimer" class="btn secondary-btn">Medical Disclaimer</a>
    </div>

</div>


</body>
</html>
